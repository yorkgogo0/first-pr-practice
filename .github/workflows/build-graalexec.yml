name: Build libgraalexec.so + GraalExec smali (ARM64 Android)

on:
  push:
    paths:
      - 'graalexec/graalexec.cpp'
      - 'graalexec/GraalExec.java'
      - '.github/workflows/build-graalexec.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Install NDK ──────────────────────────────────────────────────────────
      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME
          echo "NDK_PATH=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar" >> $GITHUB_ENV
          echo "D8=$ANDROID_HOME/build-tools/34.0.0/d8" >> $GITHUB_ENV

      # ── Compile libgraalexec.so ───────────────────────────────────────────────
      - name: Compile libgraalexec.so for ARM64
        run: |
          CXX="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++"
          SYSROOT="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          $CXX \
            -shared -fPIC -O2 -std=c++17 \
            --sysroot="$SYSROOT" \
            -Wl,--hash-style=gnu \
            -o libgraalexec.so \
            graalexec/graalexec.cpp \
            -llog -landroid
          file libgraalexec.so
          ls -lh libgraalexec.so

      # ── Compile GraalExec.java → DEX → smali ────────────────────────────────
      - name: Compile GraalExec.java
        run: |
          mkdir -p build/classes
          javac \
            -source 8 -target 8 \
            -cp "$ANDROID_JAR" \
            -d build/classes \
            graalexec/GraalExec.java
          echo "=== Compiled classes ==="
          find build/classes -name "*.class"

      - name: Dex with d8
        run: |
          mkdir -p build/dex
          $D8 \
            --output build/dex \
            --lib "$ANDROID_JAR" \
            --min-api 21 \
            $(find build/classes -name "*.class")
          ls -lh build/dex/classes.dex

      - name: Baksmali DEX to smali
        run: |
          # Download baksmali
          curl -sSL \
            https://github.com/JesusFreke/smali/releases/download/v2.5.2/baksmali-2.5.2.jar \
            -o baksmali.jar
          mkdir -p build/smali
          java -jar baksmali.jar disassemble \
            build/dex/classes.dex \
            -o build/smali
          echo "=== Smali files ==="
          find build/smali -name "*.smali"
          # Show GraalExec.smali so we can verify it
          cat build/smali/com/graal/exec/GraalExec.smali || true

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload libgraalexec.so
        uses: actions/upload-artifact@v4
        with:
          name: libgraalexec-arm64
          path: libgraalexec.so
          retention-days: 7

      - name: Upload smali files
        uses: actions/upload-artifact@v4
        with:
          name: graalexec-smali
          path: build/smali/
          retention-days: 7
