name: Build libgraalexec.so + GraalExec smali (ARM64 Android)

on:
  push:
    paths:
      - 'graalexec/graalexec.cpp'
      - 'graalexec/GraalExec.java'
      - 'CMakeLists.txt'
      - '.github/workflows/build-graalexec.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Install Android NDK + build tools ────────────────────────────────────────
      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME
          echo "NDK_PATH=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV
          echo "ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar" >> $GITHUB_ENV
          echo "D8=$ANDROID_HOME/build-tools/34.0.0/d8" >> $GITHUB_ENV

      # ── Install bison + flex (required by gs2-parser's CMake build) ──────────────
      - name: Install bison and flex
        run: sudo apt-get install -y bison flex

      # ── Checkout gs2-parser (no submodules — skip emsdk) ────────────────────────
      - name: Checkout gs2-parser
        uses: actions/checkout@v4
        with:
          repository: xtjoeytx/gs2-parser
          path: gs2-parser
          submodules: false

      # ── Build libgraalexec.so via CMake (links gs2-parser statically) ────────────
      - name: Build libgraalexec.so for ARM64
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGS2PARSER_BUILD_GS2TEST=OFF
          cmake --build build --parallel
          cp build/libgraalexec.so .
          file libgraalexec.so
          ls -lh libgraalexec.so

      # ── Compile GraalExec.java → DEX → smali ────────────────────────────────────
      - name: Compile GraalExec.java
        run: |
          mkdir -p build/classes
          javac \
            -source 8 -target 8 \
            -cp "$ANDROID_JAR" \
            -d build/classes \
            graalexec/GraalExec.java
          echo "=== Compiled classes ==="
          find build/classes -name "*.class"

      - name: Dex with d8
        run: |
          mkdir -p build/dex
          $D8 \
            --output build/dex \
            --lib "$ANDROID_JAR" \
            --min-api 21 \
            $(find build/classes -name "*.class")
          ls -lh build/dex/classes.dex

      - name: Install baksmali
        run: sudo apt-get install -y --no-install-recommends smali

      - name: Baksmali DEX to smali
        run: |
          mkdir -p build/smali
          baksmali disassemble build/dex/classes.dex -o build/smali
          echo "=== Smali files ==="
          find build/smali -name "*.smali"

      # ── Upload artifacts ──────────────────────────────────────────────────────────
      - name: Upload libgraalexec.so
        uses: actions/upload-artifact@v4
        with:
          name: libgraalexec-arm64
          path: libgraalexec.so
          retention-days: 7

      - name: Upload smali files
        uses: actions/upload-artifact@v4
        with:
          name: graalexec-smali
          path: build/smali/
          retention-days: 7
